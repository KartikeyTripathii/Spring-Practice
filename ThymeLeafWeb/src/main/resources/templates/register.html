<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>register here</title>
    <!--    <link rel="stylesheet" href="style.css">-->
</head>
<body>
<h1>Welcome to Registration page</h1>

<div th:if="${successMsg}">
    <h3 style="color: green" th:text="${successMsg}"></h3>
</div>

<div th:if="${errorMsg}">
    <h3 style="color: red" th:text="${successMsg}"></h3>
</div>

<form th:action="@{/regForm}" th:object="${user}" method="post">
    name: <input type="text" name="name" th:field="*{name}"><br>
    email: <input type="email" th:field="*{email}"><br>
    password: <input type="password" th:field="*{password}"><br>
    <input type="submit" value="register"><br>
</form>

<a href="loginPage">login here if already registered</a>

<!--<script src="index.js"></script>-->
</body>
</html>
